    <script>


const buttons = document.querySelectorAll(".category-btn");
const cards = document.querySelectorAll(".playlist-card");

buttons.forEach(button => {

  button.addEventListener("click", () => {

    // Remove active class from all buttons

    buttons.forEach(btn => {
      btn.classList.remove("active");
    });

    // Add active class to clicked button

    button.classList.add("active");

    // Get selected category

    const category = button.getAttribute("data-category");

    // Show / Hide cards

    cards.forEach(card => {

      const cardType = card.getAttribute("data-type");

      if (category === "all" || category === cardType) {

        card.parentElement.style.display = "block";

      } else {

        card.parentElement.style.display = "none";

      }

    });

  });

});

// =========================
// PLAY SONG FUNCTION
// =========================

const PlaySong = (songid) => {

    // Get all songs
    const allSongs = document.querySelectorAll(".audio");

    // Get all play buttons
    const allButtons = document.querySelectorAll(".play-button");

    // Stop all songs
    allSongs.forEach((song) => {

        song.pause();
        song.currentTime = 0;

    });

    // Reset all buttons
    allButtons.forEach((btn) => {

        btn.innerHTML = "▶ Play";

    });

    // Selected song
    const songToPlay = document.getElementById("song" + songid);

    // Selected button
    const playButton = document.getElementById("playBtn" + songid);

    // Play song
    songToPlay.play();

    // Change button text
    playButton.innerHTML = "⏸ Playing";

    // When song ends
    songToPlay.onended = () => {

        playButton.innerHTML = "▶ Play";

    };
};


// =========================
// STOP SONG FUNCTION
// =========================

const StopSong = (songid) => {

    const songToStop = document.getElementById("song" + songid);

    const playButton = document.getElementById("playBtn" + songid);

    songToStop.pause();

    songToStop.currentTime = 0;

    // Reset button
    playButton.innerHTML = "▶ Play";
};


// =========================
// DISPLAY SONGS
// =========================

const songsTable = document.getElementById("songsTable");

songs.map((song) => {

    songsTable.innerHTML += `

    <tr>

        <td>${song.id}</td>

        <td>${song.title}</td>

        <td>${song.singer}</td>

        <td>${song.duration}</td>

        <td>

            <!-- PLAY BUTTON -->
            <button
                id="playBtn${song.id}"
                class="play-button btn btn-sm control-btn"
                onclick="PlaySong(${song.id})"
            >
                ▶ Play
            </button>

            <!-- STOP BUTTON -->
            <button class="btn btn-sm control-btn" onclick="StopSong(${song.id})">
                ⏹ Stop
            </button>

            <!-- AUDIO -->
            <audio
                id="song${song.id}"
                class="audio"
                src="${song.audio}">
            </audio>

        </td>

    </tr>

    `;
});
