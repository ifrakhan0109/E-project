<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen Up - Create Account</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
             background-color: #121212; 
             color: #ffffff; 
            font-family: Arial, sans-serif;
        }

        .signup-card {
            background-color: black; 
            border: 1px solid #333333;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        
        .text-neon-pink {
            color: #ff007f!important;
        }

        
        label {
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        
        .form-control {
            background-color: #2c2c2c;
            border: 1px solid #444444;
            color: #ffffff; 
        }

        .form-control:focus {
            background-color: #333333;
            color: #ffffff;
            border-color:#ff007f; 
            box-shadow: 0 0 8px #ff007f(255, 102, 204, 0.4);
        }

       
        .btn-submit {
            background-color:#ff007f;
            color: #000000;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color:#ff007f; 
            cursor: pointer;
        }

        .error-text {
            color: #ff007f;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
            
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="signup-card">
        <div class="text-center">
           
            <h2 class="fw-bold" style="color: #ffffff;">LISTEN <span class="text-neon-pink">UP</span></h2>
            <p style="color: #cccccc; font-size: 0.8rem; letter-spacing: 2px;">FEEL EVERY BEAT</p>
        </div>

        <form id="signupForm">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" id="username" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min. 8 characters">
                <div id="passError" class="error-text">Password must be at least 8 characters.</div>
            </div>

            <div class="mb-4">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password">
                <div id="matchError" class="error-text">Passwords do not match!</div>
            </div>

            <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
        </form>

        <p class="text-center mt-4" style="font-size: 0.9rem;">
            Already have an account? <a href="#" class="text-neon-pink" style="text-decoration: none;">Login</a>
        </p>
    </div>

    <script>
        
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirmPassword').value;
            
            let valid = true;

            if (pass.length < 8) {
                document.getElementById('passError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('passError').style.display = 'none';
            }

            if (pass !== conf) {
                document.getElementById('matchError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('matchError').style.display = 'none';
            }

            if (valid) {
                alert("Account created successfully for Listen Up!");
            }
        });
    </script>
</body>
</html>
