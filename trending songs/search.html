<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Bar</title>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    body{
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial, sans-serif;
    }

    .search-box{
      width:700px;
      background:#1f1f1f;
      border-radius:50px;
      padding:14px 20px;
      display:flex;
      align-items:center;
      gap:15px;
    }

    .search-box i{
      color:#b3b3b3;
      font-size:32px;
    }

    .search-box input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:white;
      font-size:20px;
    }

    .search-box input::placeholder{
      color:#d1d1d1;
    }

    .divider{
      width:1px;
      height:35px;
      background:#6b6b6b;
    }

    .browse-icon{
      font-size:26px !important;
      cursor:pointer;
    }

  </style>
</head>
<body>

  <div class="search-box">

    <!-- Search Icon -->
    <i class="bi bi-search"></i>

    <!-- Input -->
    <input type="text" placeholder="What do you want to play?">

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Browse Icon -->
    <i class="bi bi-collection browse-icon"></i>

  </div>

</body>
</html>
